name: Build and Deploy Docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y asciidoctor plantuml graphviz

      - name: Install goplantuml fork (dev branch)
        run: |
          git clone -b dev https://github.com/NilsEckerle/goplantuml.git /tmp/goplantuml
          cd /tmp/goplantuml
          go install ./cmd/goplantuml
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Generate docs
        run: ./adoc-gen.sh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
